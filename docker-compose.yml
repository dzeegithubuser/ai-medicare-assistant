services:
  # ── .NET API Backend ──
  api:
    build:
      context: ./api-ai-medicare-assistant
      dockerfile: Dockerfile
    container_name: medicare-assistant-api
    ports:
      - "5024:5024"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5024
      # Override connection strings via env vars
      - ConnectionStrings__DefaultConnection=${MYSQL_CONNECTION}
      - ConnectionStrings__MongoDb=${MONGO_CONNECTION}
      - MongoDb__DatabaseName=${MONGO_DB_NAME}
      # JWT
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=AI.MedicareAssistant
      - Jwt__Audience=AI.MedicareAssistant.Client
      - Jwt__ExpiryHours=24
      # AI Providers
      - AiProvider=${AI_PROVIDER}
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - OpenAI__Model=${OPENAI_MODEL}
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY}
      - Anthropic__Model=${ANTHROPIC_MODEL}
      - Anthropic__BaseUrl=${ANTHROPIC_BASE_URL}
      - Anthropic__MaxTokens=${ANTHROPIC_MAX_TOKENS}
      # Google
      - Google__PlacesApiKey=${GOOGLE_PLACES_API_KEY}
      # Financial Planner
      - FinancialPlanner__BaseUrl=${FP_BASE_URL}
      - FinancialPlanner__AuthToken=${FP_AUTH_TOKEN}
      # Email
      - Email__Host=${EMAIL_HOST}
      - Email__Port=${EMAIL_PORT}
      - Email__EnableSsl=${EMAIL_ENABLE_SSL}
      - Email__FromAddress=${EMAIL_FROM_ADDRESS}
      - Email__FromDisplayName=${EMAIL_FROM_DISPLAY_NAME}
      - Email__Password=${EMAIL_PASSWORD}
      - Email__TimeoutMs=${EMAIL_TIMEOUT_MS}
      - Email__FrontendBaseUrl=${EMAIL_FRONTEND_BASE_URL}
      # CMS
      - CMS__MedicarePartDSpendingUrl=${CMS_MEDICARE_PART_D_SPENDING_URL}
      # CORS
      - Cors__AllowedOrigins__0=${CORS_ALLOWED_ORIGINS_0}
      - Cors__AllowedOrigins__1=${CORS_ALLOWED_ORIGINS_1}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5024/api/ReferenceData"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Angular Frontend (Nginx) ──
  ui:
    build:
      context: ./ui-ai-medicare-assistant
      dockerfile: Dockerfile
    container_name: medicare-assistant-ui
    ports:
      - "9600:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
