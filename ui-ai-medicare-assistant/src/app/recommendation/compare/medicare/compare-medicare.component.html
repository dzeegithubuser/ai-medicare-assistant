@let l = left();
@let r = right();

<app-compare-medicare-metrics [left]="l" [right]="r" />

<mat-tab-group mat-stretch-tabs="false" mat-align-tabs="start" animationDuration="200ms">

  <!-- Tab: Overview -->
  <mat-tab>
    <ng-template mat-tab-label>
      <span class="inline-flex items-center gap-1.5"><mat-icon class="!text-lg">dashboard</mat-icon> Overview</span>
    </ng-template>
    <app-compare-tab-overview [left]="l" [right]="r" />
  </mat-tab>

  <!-- Tab: Profile -->
  <mat-tab>
    <ng-template mat-tab-label>
      <span class="inline-flex items-center gap-1.5"><mat-icon class="!text-lg">person</mat-icon> Profile</span>
    </ng-template>
    <app-compare-tab-profile [left]="l" [right]="r" />
  </mat-tab>

  <!-- Tab: Rx, Pharmacy & Plans -->
  <mat-tab>
    <ng-template mat-tab-label>
      <span class="inline-flex items-center gap-1.5"><mat-icon class="!text-lg">local_pharmacy</mat-icon> Rx, Pharmacy & Plans</span>
    </ng-template>
    <app-compare-tab-rx-pharmacy-plans [left]="l" [right]="r" />
  </mat-tab>

  <!-- Tab: Cost Analysis (lazy-loaded) -->
  <mat-tab>
    <ng-template mat-tab-label>
      <span class="inline-flex items-center gap-1.5"><mat-icon class="!text-lg">analytics</mat-icon> Cost Analysis</span>
    </ng-template>
    <ng-template matTabContent>
      <app-compare-tab-cost-analysis [left]="l" [right]="r" />
    </ng-template>
  </mat-tab>
</mat-tab-group>
