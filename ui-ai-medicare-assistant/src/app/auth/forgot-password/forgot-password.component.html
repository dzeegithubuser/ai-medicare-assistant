<app-auth-form-shell icon="lock_reset" iconBgClass="bg-orange-500" title="Forgot Password" subtitle="Enter your email to receive a reset link">

      <!-- Error Message -->
      @if (error()) {
        <app-error-alert [message]="error()" />
      }

      <!-- Success Message -->
      @if (successMessage()) {
        <div class="mb-4 px-4 py-3 rounded-lg bg-green-50 border border-green-200 text-green-700 text-sm flex items-center gap-2">
          <mat-icon class="!text-green-500 !text-lg !w-5 !h-5">check_circle</mat-icon>
          {{ successMessage() }}
        </div>
      }

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <mat-form-field class="w-full" appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" placeholder="you@example.com">
          <mat-icon matPrefix class="mr-2 text-gray-600">email</mat-icon>
          @if (form.controls.email.hasError('email') && form.controls.email.touched) {
            <mat-error>Enter a valid email address</mat-error>
          }
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit"
                [disabled]="form.invalid || loading()"
                class="w-full !py-3 !text-base !rounded-lg">
          @if (loading()) {
            <mat-spinner diameter="20" class="inline-block mr-2"></mat-spinner>
          }
          Send Reset Link
        </button>
      </form>

      <!-- Back to Sign In -->
      <p class="text-center text-sm text-gray-500 mt-6">
        Remember your password?
        <a routerLink="/signin" class="text-cyan-600 hover:text-cyan-700 font-semibold">Sign In</a>
      </p>
</app-auth-form-shell>
