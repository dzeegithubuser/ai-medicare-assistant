<app-auth-form-shell icon="local_pharmacy" iconBgClass="bg-cyan-600" title="Welcome Back" subtitle="Sign in to Medicare Assistant">

      <!-- Error Message -->
      @if (error()) {
        <app-error-alert [message]="error()" />
      }

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <mat-form-field class="w-full" appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" placeholder="you@example.com">
          <mat-icon matPrefix class="mr-2 text-gray-600">email</mat-icon>
          @if (form.controls.email.hasError('email') && form.controls.email.touched) {
            <mat-error>Enter a valid email address</mat-error>
          }
        </mat-form-field>

        <mat-form-field class="w-full" appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" [type]="hidePassword() ? 'password' : 'text'" placeholder="Enter your password">
          <mat-icon matPrefix class="mr-2 text-gray-600">lock</mat-icon>
          <button mat-icon-button matSuffix type="button" (click)="hidePassword.set(!hidePassword())">
            <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <div class="flex justify-end">
          <a routerLink="/forgot-password" class="text-sm text-cyan-600 hover:text-cyan-700 font-medium">
            Forgot password?
          </a>
        </div>

        <button mat-raised-button color="primary" type="submit"
                [disabled]="form.invalid || loading()"
                class="w-full !py-3 !text-base !rounded-lg">
          @if (loading()) {
            <mat-spinner diameter="20" class="inline-block mr-2"></mat-spinner>
          }
          Sign In
        </button>
      </form>

      <!-- Sign Up Link -->
      <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account?
        <a routerLink="/signup" class="text-cyan-600 hover:text-cyan-700 font-semibold">Sign Up</a>
      </p>
</app-auth-form-shell>
