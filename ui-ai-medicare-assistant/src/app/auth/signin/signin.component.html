<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-cyan-50 to-cyan-100">
  <div class="w-full max-w-md mx-4">
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <!-- Logo -->
      <div class="flex flex-col items-center mb-8">
        <div class="w-14 h-14 rounded-xl bg-cyan-600 flex items-center justify-center mb-3 shadow-lg">
          <mat-icon class="!text-white !text-3xl !w-8 !h-8">local_pharmacy</mat-icon>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">Welcome Back</h1>
        <p class="text-sm text-gray-500 mt-1">Sign in to AI Medicare Assistant</p>
      </div>

      <!-- Error Message -->
      @if (error()) {
        <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm flex items-center gap-2">
          <mat-icon class="!text-red-500 !text-lg !w-5 !h-5">error</mat-icon>
          {{ error() }}
        </div>
      }

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <mat-form-field class="w-full" appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" placeholder="you@example.com">
          <mat-icon matPrefix class="mr-2 text-gray-400">email</mat-icon>
          @if (form.controls.email.hasError('email') && form.controls.email.touched) {
            <mat-error>Enter a valid email address</mat-error>
          }
        </mat-form-field>

        <mat-form-field class="w-full" appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" [type]="hidePassword() ? 'password' : 'text'" placeholder="Enter your password">
          <mat-icon matPrefix class="mr-2 text-gray-400">lock</mat-icon>
          <button mat-icon-button matSuffix type="button" (click)="hidePassword.set(!hidePassword())">
            <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <div class="flex justify-end">
          <a routerLink="/forgot-password" class="text-sm text-cyan-600 hover:text-cyan-700 font-medium">
            Forgot password?
          </a>
        </div>

        <button mat-raised-button color="primary" type="submit"
                [disabled]="form.invalid || loading()"
                class="w-full !py-3 !text-base !rounded-lg">
          @if (loading()) {
            <mat-spinner diameter="20" class="inline-block mr-2"></mat-spinner>
          }
          Sign In
        </button>
      </form>

      <!-- Sign Up Link -->
      <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account?
        <a routerLink="/signup" class="text-cyan-600 hover:text-cyan-700 font-semibold">Sign Up</a>
      </p>
    </div>
  </div>
</div>
